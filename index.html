<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小テストジェネレーター</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ========================================================
       印刷時専用の強力なレイアウトリセット
    ======================================================== */
    @media print {
      @page { 
        size: A4 portrait; 
        margin: 15mm; 
      }
      
      html, body, #root {
        height: auto !important;
        min-height: auto !important;
        overflow: visible !important;
        background-color: white !important;
        -webkit-print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      
      /* 画面用の固定レイアウトを解除 */
      .screen-layout {
        display: block !important;
        height: auto !important;
        overflow: visible !important;
      }
      
      /* サイドバーなどを非表示 */
      .print-hidden {
        display: none !important;
      }
      
      /* メイン領域の余白・背景をリセットして全幅に */
      .main-content {
        display: block !important;
        height: auto !important;
        overflow: visible !important;
        width: 100% !important;
        padding: 0 !important;
        margin: 0 !important;
        background: transparent !important;
      }
      
      .print-wrapper {
        padding: 0 !important;
        display: block !important;
        background: transparent !important;
      }
      
      /* テスト用紙本体を画面幅いっぱいに広げる */
      .print-paper {
        width: 100% !important;
        max-width: 100% !important;
        min-height: auto !important;
        margin: 0 !important;
        padding: 0 !important;
        box-shadow: none !important;
      }

      /* 設問がページをまたいで分断されるのを防ぐ */
      li {
        page-break-inside: avoid !important;
        break-inside: avoid !important;
      }
    }

    /* 画面用のスクロールバー装飾 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const IconBook = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
    const IconRefresh = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>;
    const IconUsers = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
    const IconChart = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><rect x="7" y="14" width="4" height="5"/><rect x="13" y="9" width="4" height="10"/></svg>;
    const IconSettings = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
    const IconPrinter = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>;
    const IconPlus = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const IconTrash = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const IconSave = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const IconGraduation = ({size=18, className=""}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;

    // --- ランダム語彙辞書 ---
    const dict = {
      names_m: ["Tom", "Ken", "John", "Bob", "Mike", "David", "Jim", "Paul", "Kevin"],
      names_f: ["Mary", "Yumi", "Lucy", "Jane", "Nancy", "Emma", "Lisa", "Ann", "Kate"],
      cities: ["Tokyo", "London", "New York", "Paris", "Kyoto", "Canada", "Australia", "Hawaii", "Sydney", "Boston"],
      time_past: ["yesterday", "last night", "last week", "two days ago", "this morning", "a few days ago"],
      time_future: ["tomorrow", "next week", "soon", "this evening", "next year"],
      items: ["a book", "a dictionary", "some flowers", "a watch", "a CD", "a new computer", "an umbrella", "a camera", "a bag", "a pen"],
      sports: ["tennis", "soccer", "baseball", "basketball", "volleyball"],
    };

    const r = (array) => array[Math.floor(Math.random() * array.length)];
    const rName = () => r([...dict.names_m, ...dict.names_f]);

    const availableChapters = [
      { id: 1, title: "第1章 文型" }, { id: 2, title: "第2章 文の種類" }, { id: 3, title: "第3章 基本時制" },
      { id: 4, title: "第4章 完了形" }, { id: 5, title: "第5章 助動詞" }, { id: 6, title: "第6章 受動態" },
      { id: 7, title: "第7章 不定詞" }, { id: 8, title: "第8章 動名詞" }, { id: 9, title: "第9章 分詞" },
      { id: 10, title: "第10章 使役動詞、知覚動詞" }, { id: 11, title: "第11章 分詞構文" }, { id: 12, title: "第12章 関係代名詞" },
      { id: 13, title: "第13章 関係副詞" }, { id: 14, title: "第14章 比較" }, { id: 15, title: "第15章 仮定法" },
      { id: 16, title: "第16章 接続詞、間接疑問文" }, { id: 17, title: "第17章 句と節" }, { id: 18, title: "第18章 話法" },
      { id: 19, title: "第19章 名詞、冠詞" }, { id: 20, title: "第20章 代名詞" }, { id: 21, title: "第21章 形容詞、副詞" },
      { id: 22, title: "第22章 強調、否定" }, { id: 23, title: "第23章 前置詞" },
    ];
    const difficulties = ["基礎", "標準", "応用"];

    // --- 問題データベース（解説付き） ---
    const questionBank = [];
    const addQ = (ch, diff, inst, genFn) => {
      questionBank.push({ chapter: ch, difficulty: diff, instruction: inst, generate: genFn });
    };

    // 1章
    addQ(1, "基礎", "文型", () => { const n = rName(); return { text: `次の英文の S, V, C を指摘しなさい。\n${n} is a student.`, answer: `S: ${n}, V: is, C: a student`, explanation: `be動詞は主語(S)と補語(C)をイコール関係で結ぶ第2文型(SVC)を作ります。` }; });
    addQ(1, "基礎", "文型", () => ({ text: `次の英文の S, V を指摘しなさい。\nThe dog runs fast.`, answer: `S: The dog, V: runs`, explanation: `run(走る)のように目的語を持たない自動詞は、第1文型(SV)を作ります。fast は修飾語(M)です。` }));
    addQ(1, "基礎", "文型", () => ({ text: `次の英文の S, V, C を指摘しなさい。\nThe story sounds interesting.`, answer: `S: The story, V: sounds, C: interesting`, explanation: `sound C で「Cのように聞こえる/思われる」という第2文型(SVC)を作ります。` }));
    addQ(1, "基礎", "文型", () => { const n = rName(); return { text: `次の英文の S, V, O を指摘しなさい。\n${n} likes listening to music.`, answer: `S: ${n}, V: likes, O: listening to music`, explanation: `like(好む)は動作の対象となる目的語(O)を必要とする他動詞なので第3文型(SVO)を作ります。` }; });
    addQ(1, "標準", "書き換え", () => { const n = rName(); const i = r(dict.items); return { text: `ほぼ同じ内容になるように（　）に適する語を入れなさい。\n${n} gave me ${i}.\n= ${n} gave ${i} (   ) me.`, answer: `to`, explanation: `give O1 O2 を第3文型に書き換える時は give O2 to O1 の形を使います。` }; });
    addQ(1, "標準", "書き換え", () => { const n = rName(); const i = r(dict.items); return { text: `ほぼ同じ内容になるように（　）に適する語を入れなさい。\n${n} bought me ${i}.\n= ${n} bought ${i} (   ) me.`, answer: `for`, explanation: `buy O1 O2 を第3文型に書き換える時は buy O2 for O1 を使います。「〜のために」という意味合いです。` }; });
    addQ(1, "標準", "和訳", () => { const n = rName(); return { text: `次の英文を日本語になおしなさい。\nWe call the girl ${n}.`, answer: `私たちはその少女を${n}と呼びます。`, explanation: `call O C で「OをCと呼ぶ」という第5文型(SVOC)を作ります。O=Cの関係が成り立ちます。` }; });
    addQ(1, "標準", "和訳", () => ({ text: `次の英文を日本語になおしなさい。\nThe news made her happy.`, answer: `その知らせは彼女を幸せにした。`, explanation: `make O C で「OをC(の状態)にする」という第5文型(SVOC)を作ります。` }));
    addQ(1, "応用", "並べかえ", () => ({ text: `日本文の意味を表す英文になるように並べかえなさい。\n太陽は私たちに光と熱を与えてくれます。\n( gives / and / sun / heat / light / us / the / . )`, answer: `The sun gives us light and heat.`, explanation: `S(The sun) + V(gives) + O1(us) + O2(light and heat) の第4文型に並べ替えます。` }));
    addQ(1, "応用", "並べかえ", () => ({ text: `日本文の意味を表す英文になるように並べかえなさい。\nこの辞書を私に貸してくれませんか。\n( lend / this dictionary / me / will / you / ? )`, answer: `Will you lend me this dictionary?`, explanation: `Will you lend + O1(me) + O2(this dictionary)? で「O1にO2を貸す」という第4文型の疑問文を作ります。` }));

    // 2章
    addQ(2, "基礎", "否定文", () => { const n = rName(); const c = r(dict.cities); return { text: `否定文に書きかえなさい。\n${n} is from ${c}.`, answer: `${n} is not [isn't] from ${c}.`, explanation: `be動詞の否定文は、be動詞の直後に not を置きます。` }; });
    addQ(2, "基礎", "否定文", () => { const n = rName(); return { text: `否定文に書きかえなさい。\n${n} lives in this town.`, answer: `${n} does not [doesn't] live in this town.`, explanation: `一般動詞の現在形(3人称単数)の否定文は、does not (doesn't) + 動詞の原形 にします。` }; });
    addQ(2, "基礎", "疑問文", () => { const n = rName(); return { text: `疑問文に書きかえなさい。\n${n} went to the concert.`, answer: `Did ${n} go to the concert?`, explanation: `一般動詞の過去形の疑問文は文頭に Did を置き、動詞は原形(go)に戻します。` }; });
    addQ(2, "標準", "付加疑問文", () => { const isM=Math.random()>0.5; const n=isM?r(dict.names_m):r(dict.names_f); const pro=isM?"he":"she"; return { text: `（　）に適する語を入れて付加疑問文を完成しなさい。\n${n} isn't a student, (   ) (   )?`, answer: `is ${pro}`, explanation: `前の文が否定文なので、後ろは肯定の付加疑問(is he / she)をつけます。` }; });
    addQ(2, "標準", "感嘆文", () => ({ text: `（　）に適する語を入れて感嘆文を完成しなさい。\n(   ) beautiful this flower is!`, answer: `How`, explanation: `How + 形容詞/副詞 + (S + V)! の語順で「なんて〜なんでしょう」という感嘆文を作ります。` }));
    addQ(2, "標準", "感嘆文", () => ({ text: `（　）に適する語を入れて感嘆文を完成しなさい。\n(   ) a big dog he has!`, answer: `What`, explanation: `What + (a/an) + 形容詞 + 名詞 + (S + V)! の語順で名詞を強調する感嘆文を作ります。` }));
    addQ(2, "応用", "書き換え", () => ({ text: `ほぼ同じ内容になるように（　）に適する語を入れなさい。\nYou mustn't eat between meals.\n= (   ) eat between meals.`, answer: `Don't`, explanation: `「〜してはいけない」という禁止は、Don't + 動詞の原形 で表すことができます。` }));
    addQ(2, "応用", "誤文訂正", () => ({ text: `誤りの部分に下線を引いて、正しい表現を書きなさい。\nHow do you think of our new teacher?`, answer: `How -> What`, explanation: `「〜をどう思いますか」と尋ねる場合は、How ではなく What do you think of(about) ~? を使います。` }));

    // 3章
    addQ(3, "基礎", "未来形", () => ({ text: `will を使って未来の文に書きかえなさい。\nIt rains.`, answer: `It will rain.`, explanation: `will + 動詞の原形 で未来の事柄(〜だろう)を表します。` }));
    addQ(3, "基礎", "時制", () => { const n = rName(); return { text: `（　）内の指示に従って書きかえなさい。\n${n} uses this computer. （否定文に）`, answer: `${n} does not [doesn't] use this computer.`, explanation: `主語が3人称単数なので doesn't を使い、動詞は原形に戻します。` }; });
    addQ(3, "基礎", "時制", () => ({ text: `（　）内の動詞を適する形になおしなさい。\nI ( be ) not at home last night.`, answer: `was`, explanation: `last night(昨夜)から過去のことだとわかるため、主語 I に合わせて was にします。` }));
    addQ(3, "標準", "進行形", () => ({ text: `進行形の文になおしなさい。\nThe dog lies under the table.`, answer: `The dog is lying under the table.`, explanation: `be動詞 + ~ing で進行形を作ります。lie の ~ing 形は lying となります。` }));
    addQ(3, "標準", "助動詞", () => ({ text: `日本語を参考にして、（　）に will または shall を入れなさい。\n(   ) we climb the mountain next month? （〜しましょうか）`, answer: `Shall`, explanation: `Shall we ~? で「一緒に〜しましょうか」と提案する表現になります。` }));
    addQ(3, "標準", "時制の一致", () => { const n = rName(); return { text: `下線部の動詞を過去形にして、文全体を書きかえなさい。\nI think that ${n} can speak English.`, answer: `I thought that ${n} could speak English.`, explanation: `主節の動詞(think)が過去形(thought)になったので、従属節の can も過去形(could)に一致させます。` }; });
    addQ(3, "応用", "並べかえ", () => { const n = rName(); return { text: `（　）内の語を並べかえて、意味の通る英文を完成しなさい。\n( arriving / is / seven / ${n} / at ) this evening.`, answer: `${n} is arriving at seven this evening.`, explanation: `be動詞 + ~ing の進行形で「（近い未来に）〜する予定だ」という確定的な未来を表すことができます。` }; });
    addQ(3, "応用", "英訳", () => ({ text: `次の日本文を英文になおしなさい。\n私たちは雨がやんだら、出発するつもりです。`, answer: `We will start when it stops raining.`, explanation: `時や条件を表す副詞節(when 〜)の中では、未来のことでも現在形(stops)で表すという重要なルールがあります。` }));

    // 4章
    addQ(4, "基礎", "完了形", () => { const t = r(dict.time_past); return { text: `（　）内の語句を加えて現在完了の文にしなさい。\nIt is cold. ( since ${t} )`, answer: `It has been cold since ${t}.`, explanation: `have(has) + 過去分詞 で「ずっと〜している」という継続を表します。sinceは「〜以来」です。` }; });
    addQ(4, "基礎", "完了形", () => { const c = r(dict.cities); return { text: `（　）に適する語を下から選んで入れなさい。\nShe has (   ) been to ${c}. （行ったことは一度もない）\n[ ever, never, for, yet, already, just, since ]`, answer: `never`, explanation: `have(has) never + 過去分詞 で「一度も〜したことがない」という経験の否定を表します。` }; });
    addQ(4, "基礎", "完了形", () => ({ text: `（　）内の語句を加えて現在完了の文にしなさい。\nI have met her before. （否定文に）`, answer: `I have not [haven't] met her before.`, explanation: `現在完了形の否定文は have(has) の直後に not を置きます。` }));
    addQ(4, "標準", "完了形", () => { const n = rName(); return { text: `日本文の意味を表す英文になるように、（　）に適する語を入れなさい。\n私は先月以来ずっと${n}を見かけていません。\nI (   )(   ) ${n} (   ) last month.`, answer: `have not seen [haven't seen] / since`, explanation: `「〜以来」は since を使い、「見かけていない」は現在完了の否定形で表します。` }; });
    addQ(4, "標準", "完了進行形", () => ({ text: `日本文の意味を表す英文になるように、（　）に適する語を入れなさい。\n昨日から雨が降ったりやんだりしています。\nIt (   )(   )(   ) on and off since yesterday.`, answer: `has been raining`, explanation: `have(has) been + ~ing で「（今まで）ずっと〜し続けている」という動作の継続を表します。` }));
    addQ(4, "応用", "並べかえ", () => ({ text: `日本文の意味を表す英文になるように並べかえなさい。１語不要な語があります。\n私はこれほどすばらしい映画を今まで見たことがありません。\n( I / never / have / such / movie / seen / fantastic / a / . )`, answer: `I have never seen such a fantastic movie.`, explanation: `I have never seen such a ~ で「これまでにこんな〜を見たことがない」という現在完了の経験を表す表現です。` }));
    addQ(4, "応用", "並べかえ", () => ({ text: `日本文の意味を表す英文になるように並べかえなさい。１語不要な語があります。\n彼女たちは１時間以上おしゃべりをしています。\n( talking / for / than / an hour / they / been / more / have / . )`, answer: `They have been talking for more than an hour.`, explanation: `They have been talking (完了進行形) + for more than an hour (1時間以上) という構成になります。` }));

    // 5章

    // 17章
    addQ(17, "基礎", "句と節", () => ({ text: `下線部が名詞句ならA、形容詞句ならB、副詞句ならCを書きなさい。\nJim likes [listening to music].`, answer: `A`, explanation: `listening to music が動詞 likes の目的語(O)になっているため、名詞と同じ働きをする名詞句です。` }));
    addQ(17, "標準", "書き換え", () => ({ text: `ほぼ同じ内容になるように、（　）に適する語を入れなさい。\nIt seems that Jane is fond of Japanese food.\nJane seems (   )(   ) fond of Japanese food.`, answer: `to be`, explanation: `It seems that S V ~ は、S seems to不定詞 に書き換えることができます。` }));
    addQ(17, "応用", "無生物主語", () => ({ text: `ほぼ同じ内容になるように、（　）に適する語を入れなさい。\nWhy did you come here?\n(   )(   ) you here?`, answer: `What brought`, explanation: `What brought you here? (何があなたをここに連れてきたか) で「なぜここへ来たのですか」という意味になります。` }));

    // 18章
    addQ(18, "基礎", "時制の一致", () => ({ text: `（　）内から適する語を選びなさい。\nI thought that it ( will, would ) rain the next morning.`, answer: `would`, explanation: `主節の動詞(thought)が過去形なので、従属節の will も過去形(would)にする必要があります。` }));
    addQ(18, "標準", "話法", () => ({ text: `間接話法の文に書きかえなさい。\nHe said to me, "I'm hungry."`, answer: `He told me that he was hungry.`, explanation: `平叙文の伝達は said to ~ を told ~ にし、代名詞や時制を話者の立場に合わせて書き換えます。` }));
    addQ(18, "応用", "話法", () => ({ text: `間接話法の文に書きかえるとき、（　）に適する語を入れなさい。\nHe said to me, "Do it at once."\nHe (   ) me (   ) do it at once.`, answer: `told / to`, explanation: `命令文の伝達は tell O to不定詞 (Oに〜するように言う) を使って書き換えます。` }));

    // 19章
    addQ(19, "基礎", "名詞・冠詞", () => ({ text: `（　）に a または an を入れなさい。\n(   ) useful animal / (   ) umbrella / (   ) year`, answer: `a / an / a`, explanation: `母音(アイウエオ)の音で始まる名詞の前には an をつけます。useful は[j]、year は[j]の音なので a になります。` }));
    addQ(19, "標準", "名詞", () => ({ text: `（　）内の語を適する形になおしなさい。\nHow many ( knife ) are there on the plate?`, answer: `knives`, explanation: `f または fe で終わる名詞(knife)は、v に変えて es をつけます。` }));
    addQ(19, "応用", "冠詞の省略", () => ({ text: `下線部の冠詞が必要なものには○、不要なものには×を書きなさい。\nChildren start [the] school at the age of six in this country.`, answer: `×`, explanation: `school が「学校という建物」ではなく、本来の目的である「授業・教育」を意味する場合は無冠詞になります。` }));

    // 20章
    addQ(20, "基礎", "代名詞", () => ({ text: `（　）内から適する語を選びなさい。\n( Each, Both ) of my parents are alive.`, answer: `Both`, explanation: `「両親(2人)の両方」を表すので Both が適当です。Each を使うと単数扱いになってしまいます。` }));
    addQ(20, "標準", "代名詞", () => { const c = r(dict.cities); return { text: `（　）内から適する語を選びなさい。\nThe climate here is milder than ( that / those ) of ${c}.`, answer: `that`, explanation: `反復を避けるための代名詞で、単数名詞(the climate)の代わりには that を使います(複数は those)。` }; });
    addQ(20, "応用", "代名詞", () => ({ text: `（　）に適する語を入れなさい。\nSome come to school by bike, and (   ) on foot.`, answer: `others`, explanation: `Some ~, others ... で「〜なものもあれば、…なものもある」という全体の一部を取り出す表現になります。` }));

    // 21章
    addQ(21, "基礎", "形容詞・副詞", () => ({ text: `（　）内の語を入れるとき、最も適する箇所を記号で答えなさい。\nHe is (a) a (b) speaker (c) of English. (good)`, answer: `(b)`, explanation: `名詞を修飾する形容詞(good)は、名詞(speaker)の直前に置きます(a good speaker)。` }));
    addQ(21, "標準", "数量形容詞", () => ({ text: `（　）に最も適する語を選んで入れなさい。\nMy aunt is very sick; there is (   ) hope of her recovery. [ many / much / a few / a little / few / little ]`, answer: `little`, explanation: `hope(希望)は数えられない名詞で、文脈から「ほとんど望みがない」という意味になるため little を使います。` }));
    addQ(21, "応用", "注意すべき副詞", () => ({ text: `（　）内から適切な語を選びなさい。\nJohn often comes ( late, lately ) to class.`, answer: `late`, explanation: `late は「遅く(遅れて)」、lately は「最近」という意味です。ここでは「遅れて」の意味になります。` }));

    // 22章
    addQ(22, "基礎", "強調", () => ({ text: `It is(was) ~ that ... の構文を使って下線部を強調する文をつくりなさい。\nTom broke [the window] yesterday.`, answer: `It was the window that Tom broke yesterday.`, explanation: `It was ~ that ... の ~ の部分に強調したい語句(the window)を挟み込みます。` }));
    addQ(22, "標準", "否定", () => ({ text: `（　）内の日本文を参考にして、英文を完成しなさい。\n(   ) (   ) the students were absent. （生徒全員が欠席したわけではなかった）`, answer: `Not all`, explanation: `Not all ~ で「すべてが〜というわけではない」という部分否定の表現になります。` }));
    addQ(22, "応用", "慣用表現", () => ({ text: `日本文の意味を表す英文になるように、（　）に適する語を入れなさい。\n健康にはいくら注意してもしすぎることはありません。\nYou (   ) be (   ) careful of your health.`, answer: `cannot / too`, explanation: `cannot ~ too ... で「いくら…してもしすぎることはない」という表現になります。` }));

    // 23章
    addQ(23, "基礎", "前置詞", () => ({ text: `（　）内から適切な語を選びなさい。\nI usually get up ( at / on / in ) seven ( at / on / in ) the morning.`, answer: `at / in`, explanation: `時刻の前には at を、午前・午後など特定の期間には in (in the morning) を使います。` }));
    addQ(23, "標準", "前置詞", () => ({ text: `日本文の意味を表す英文になるように、（　）に適する語を入れなさい。\nお茶を飲みながらその問題について話しましょう。\nLet's talk about the matter (   ) a cup of tea.`, answer: `over`, explanation: `over a cup of tea で「お茶を飲みながら」という意味の慣用表現です。` }));
    addQ(23, "応用", "代償の前置詞", () => ({ text: `（　）内から適する語を選びなさい。\nHe bought a new camera ( for / at / on / by ) twenty thousand yen.`, answer: `for`, explanation: `代償・交換（〜の金額で）を表す場合は、前置詞 for を使います。` }));


    function App() {
      const [activeTab, setActiveTab] = useState('test');

      const [selectedChapters, setSelectedChapters] = useState([1, 2, 3]);
      const [selectedDifficulties, setSelectedDifficulties] = useState(["基礎", "標準"]);
      const [numQuestions, setNumQuestions] = useState(10);
      const [testPaper, setTestPaper] = useState(null);
      const [targetStudentId, setTargetStudentId] = useState("");
      const [grading, setGrading] = useState({});
      const [showAnswers, setShowAnswers] = useState(false); 

      const [students, setStudents] = useState([]);
      const [scores, setScores] = useState({}); 

      const [scoreViewStudentId, setScoreViewStudentId] = useState("");
      const [newStudentName, setNewStudentName] = useState("");

      useEffect(() => {
        const savedStudents = localStorage.getItem('leadEnglish_students');
        const savedScores = localStorage.getItem('leadEnglish_scores');
        if (savedStudents) setStudents(JSON.parse(savedStudents));
        if (savedScores) setScores(JSON.parse(savedScores));
      }, []);

      useEffect(() => {
        localStorage.setItem('leadEnglish_students', JSON.stringify(students));
      }, [students]);

      useEffect(() => {
        localStorage.setItem('leadEnglish_scores', JSON.stringify(scores));
      }, [scores]);

      // --- 重複排除のテスト生成ロジック ---
      const generateTest = () => {
        if (selectedChapters.length === 0 || selectedDifficulties.length === 0) {
          alert("出題範囲と難易度を1つ以上選択してください。");
          return;
        }

        let availableTemplates = questionBank.filter(q => 
          selectedChapters.includes(q.chapter) && selectedDifficulties.includes(q.difficulty)
        );

        if (availableTemplates.length === 0) {
          alert("選択された条件に一致する問題データがありません。条件を広げてみてください。");
          return;
        }

        let actualNum = numQuestions;
        if (availableTemplates.length < numQuestions) {
          alert(`指定された条件では問題ストックが ${availableTemplates.length} 種類しかありません。重複を避けるため ${availableTemplates.length} 問のテストを生成します。`);
          actualNum = availableTemplates.length;
        }

        const shuffled = [...availableTemplates].sort(() => Math.random() - 0.5);
        let questions = [];
        
        for (let i = 0; i < actualNum; i++) {
          const template = shuffled[i];
          const generated = template.generate();
          questions.push({
            ...generated,
            chapter: template.chapter,
            instruction: template.instruction
          });
        }

        const today = new Date();
        const targetStudent = students.find(s => s.id === targetStudentId);

        setTestPaper({
          date: `${today.getFullYear()}年 ${today.getMonth() + 1}月 ${today.getDate()}日`,
          studentId: targetStudentId,
          studentName: targetStudent ? targetStudent.name : "",
          questions: questions,
          chapters: selectedChapters
        });
        
        setGrading({});
        setActiveTab('test');
      };

      useEffect(() => {
        if(!testPaper) generateTest();
      }, []);

      const addStudent = () => {
        if (!newStudentName.trim()) return;
        const newId = crypto.randomUUID();
        setStudents([...students, { id: newId, name: newStudentName.trim() }]);
        setNewStudentName("");
        if (!scoreViewStudentId) setScoreViewStudentId(newId);
      };

      const removeStudent = (id) => {
        if (window.confirm("この生徒と成績データを削除しますか？")) {
          setStudents(students.filter(s => s.id !== id));
          const newScores = { ...scores };
          delete newScores[id];
          setScores(newScores);
          if (targetStudentId === id) setTargetStudentId("");
          if (scoreViewStudentId === id) setScoreViewStudentId("");
        }
      };

      const saveGrades = () => {
        if (!testPaper || !testPaper.studentId) {
          alert("生徒が選択されていません。左のパネルから対象生徒を選択してテストを生成してから採点してください。");
          return;
        }

        if (Object.keys(grading).length < testPaper.questions.length) {
          if (!window.confirm("未採点の問題があります。未採点の問題は不正解として集計しますがよろしいですか？")) {
            return;
          }
        }

        const sid = testPaper.studentId;
        const newScores = { ...scores };
        if (!newScores[sid]) newScores[sid] = {};

        testPaper.questions.forEach((q, index) => {
          const cid = q.chapter;
          const isCorrect = grading[index] === true;

          if (!newScores[sid][cid]) newScores[sid][cid] = { correct: 0, total: 0 };
          
          newScores[sid][cid].total += 1;
          if (isCorrect) {
            newScores[sid][cid].correct += 1;
          }
        });

        setScores(newScores);
        alert("成績を保存しました！");
        setScoreViewStudentId(sid);
        setActiveTab('scores');
      };

      return (
        <div className="flex h-screen overflow-hidden screen-layout">
          
          {/* 左サイドバー */}
          <aside className="w-80 bg-white border-r border-gray-200 flex flex-col h-full print-hidden shadow-lg z-10 flex-shrink-0">
            <div className="p-6 border-b border-gray-200 bg-gray-50">
              <div className="flex items-center gap-2 mb-6 text-indigo-700">
                <IconBook size={24} />
                <h1 className="text-lg font-bold tracking-tight">小テストメーカー</h1>
              </div>
              
              <div className="flex flex-col gap-2">
                <button onClick={() => setActiveTab('test')} className={`flex items-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-colors ${activeTab === 'test' ? 'bg-indigo-600 text-white shadow-sm' : 'hover:bg-gray-200 text-gray-600'}`}>
                  <IconRefresh size={18} /> テスト作成
                </button>
                <button onClick={() => setActiveTab('manage')} className={`flex items-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-colors ${activeTab === 'manage' ? 'bg-indigo-600 text-white shadow-sm' : 'hover:bg-gray-200 text-gray-600'}`}>
                  <IconUsers size={18} /> 生徒管理
                </button>
                <button onClick={() => setActiveTab('scores')} className={`flex items-center gap-2 px-4 py-2.5 rounded-lg font-medium transition-colors ${activeTab === 'scores' ? 'bg-indigo-600 text-white shadow-sm' : 'hover:bg-gray-200 text-gray-600'}`}>
                  <IconChart size={18} /> 正答率レポート
                </button>
              </div>
            </div>

            {activeTab === 'test' && (
              <div className="p-6 overflow-y-auto flex-1 space-y-6">
                <section>
                  <h2 className="flex items-center gap-2 font-semibold text-gray-700 mb-3 pb-2 border-b"><IconUsers size={16} /> 対象生徒 (印字用)</h2>
                  <select value={targetStudentId} onChange={(e) => setTargetStudentId(e.target.value)} className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">-- 指定なし (空欄) --</option>
                    {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </section>

                <section>
                  <h2 className="flex items-center gap-2 font-semibold text-gray-700 mb-3 pb-2 border-b"><IconSettings size={16} /> 難易度</h2>
                  <div className="flex flex-wrap gap-2">
                    {difficulties.map(diff => (
                      <button key={diff} onClick={() => setSelectedDifficulties(p => p.includes(diff) ? p.filter(d => d !== diff) : [...p, diff])} className={`px-3 py-1.5 rounded-full text-xs font-medium transition-colors border ${selectedDifficulties.includes(diff) ? 'bg-indigo-100 border-indigo-300 text-indigo-800' : 'bg-white border-gray-300 text-gray-600'}`}>
                        {diff}
                      </button>
                    ))}
                  </div>
                </section>

                <section>
                  <h2 className="font-semibold text-gray-700 mb-3 pb-2 border-b flex justify-between">
                    <span>出題範囲 (複数可)</span>
                    <span className="text-xs text-indigo-600 cursor-pointer hover:underline" onClick={() => setSelectedChapters(availableChapters.map(c=>c.id))}>全選択</span>
                  </h2>
                  <div className="space-y-1 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                    {availableChapters.map(ch => (
                      <label key={ch.id} className="flex items-center gap-3 p-1.5 hover:bg-gray-50 rounded cursor-pointer">
                        <input type="checkbox" className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500" checked={selectedChapters.includes(ch.id)} onChange={() => setSelectedChapters(p => p.includes(ch.id) ? p.filter(c => c !== ch.id) : [...p, ch.id])} />
                        <span className="text-sm text-gray-700 line-clamp-1" title={ch.title}>{ch.title}</span>
                      </label>
                    ))}
                  </div>
                </section>

                <section>
                  <h2 className="font-semibold text-gray-700 mb-3 pb-2 border-b">問題数: {numQuestions} 問</h2>
                  <input type="range" min="5" max="30" step="1" value={numQuestions} onChange={(e) => setNumQuestions(Number(e.target.value))} className="w-full accent-indigo-600" />
                </section>

                <div className="pt-4 border-t border-gray-200 space-y-3">
                  <button onClick={generateTest} className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-4 rounded-lg font-semibold shadow-sm">
                    <IconRefresh size={18} /> テストを再生成
                  </button>
                  <button onClick={() => window.print()} className="w-full flex items-center justify-center gap-2 bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 py-2.5 px-4 rounded-lg font-semibold shadow-sm">
                    <IconPrinter size={18} /> 印刷する (A4)
                  </button>
                </div>
              </div>
            )}
          </aside>

          {/* メインエリア */}
          <main className="main-content flex-1 overflow-y-auto relative bg-gray-200">
            {activeTab === 'test' && testPaper && (
              <div className="print-wrapper p-8 flex justify-center min-h-full">
                <div className="print-paper w-[210mm] bg-white shadow-xl min-h-[297mm] p-12 box-border relative">
                  
                  <div className="border-b-2 border-black pb-4 mb-8 flex flex-col gap-4">
                    <div className="flex justify-between items-end">
                      <h1 className="text-3xl font-bold tracking-widest text-gray-900">英文法 小テスト</h1>
                      <div className="flex flex-col items-end gap-3">
                        <div className="text-right text-sm font-medium">実施日： {testPaper.date}</div>
                        <label className="print-hidden flex items-center gap-2 cursor-pointer bg-gray-100 px-3 py-1.5 rounded-lg border border-gray-300 hover:bg-gray-200 transition-colors select-none shadow-sm">
                          <input type="checkbox" checked={showAnswers} onChange={e => setShowAnswers(e.target.checked)} className="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer" />
                          <span className="text-sm font-bold text-gray-700">解答を表示する</span>
                        </label>
                      </div>
                    </div>
                    <div className="flex justify-end items-end gap-6 text-lg font-medium">
                      <div>氏名：<span className="border-b border-gray-500 inline-block w-48 text-center">{testPaper.studentName || ""}</span></div>
                      <div className="ml-4 border-2 border-gray-400 w-24 h-16 flex items-center justify-center relative">
                        <span className="text-gray-400 text-xs absolute top-1 left-1">得点</span>
                        <span className="print-hidden text-xl font-bold">
                          {Object.values(grading).filter(v => v).length} / {testPaper.questions.length}
                        </span>
                      </div>
                    </div>
                  </div>

                  <ol className="list-none space-y-8 mb-12">
                    {testPaper.questions.map((q, index) => (
                      <li key={index} className="flex gap-4 relative group">
                        <span className="font-bold text-lg mt-0.5">{index + 1}.</span>
                        <div className="flex-1">
                          <p className="font-bold text-gray-700 text-sm mb-1.5 flex items-center gap-2">
                            <span className="bg-gray-200 px-2 py-0.5 rounded text-xs">【{q.instruction}】</span>
                          </p>
                          <p className="whitespace-pre-wrap text-base leading-relaxed text-gray-900 mb-3">{q.text}</p>
                          
                          {showAnswers && (
                            <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md mb-3 text-sm shadow-sm break-inside-avoid">
                              <div className="font-bold mb-1">解答： {q.answer}</div>
                              {q.explanation && (
                                <div className="mt-2 text-gray-700 font-normal border-t border-red-200 pt-2">
                                  <span className="font-semibold text-indigo-700 flex items-center gap-1 mb-1">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                                    解説：
                                  </span>
                                  <span className="block ml-5 leading-relaxed">{q.explanation}</span>
                                </div>
                              )}
                            </div>
                          )}

                          <div className="w-full border-b border-gray-400 mt-4 h-6"></div>
                        </div>
                        <div className="flex gap-2 items-start ml-2 print-hidden select-none">
                          <button onClick={() => setGrading({...grading, [index]: true})} className={`w-8 h-8 flex items-center justify-center rounded-full font-bold transition-colors ${grading[index] === true ? 'bg-green-500 text-white shadow-md' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}>〇</button>
                          <button onClick={() => setGrading({...grading, [index]: false})} className={`w-8 h-8 flex items-center justify-center rounded-full font-bold transition-colors ${grading[index] === false ? 'bg-red-500 text-white shadow-md' : 'bg-gray-100 text-gray-400 hover:bg-gray-200'}`}>×</button>
                        </div>
                      </li>
                    ))}
                  </ol>

                  {testPaper.studentId && (
                    <div className="print-hidden border-t-2 border-dashed border-gray-300 pt-6 mt-8">
                      <div className="flex items-center justify-between bg-indigo-50 p-4 rounded-lg">
                        <div className="text-indigo-800">
                          <span className="font-bold">{testPaper.studentName}</span> さんの採点結果を記録します。
                        </div>
                        <button onClick={saveGrades} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-bold flex items-center gap-2 transition-colors shadow-sm">
                          <IconSave size={18} /> 成績を保存する
                        </button>
                      </div>
                    </div>
                  )}
                  {!testPaper.studentId && (
                    <div className="print-hidden border-t-2 border-dashed border-gray-300 pt-6 mt-8">
                      <div className="text-gray-500 text-center text-sm p-4 bg-gray-50 rounded-lg">
                        左側のパネルで対象生徒を選択してテストを生成すると、採点して成績を記録できます。
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {activeTab === 'manage' && (
              <div className="print-hidden p-8 max-w-4xl mx-auto space-y-8">
                <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                  <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2"><IconGraduation size={24} /> 生徒の登録</h2>
                  <div className="flex gap-3">
                    <input type="text" value={newStudentName} onChange={e => setNewStudentName(e.target.value)} onKeyDown={e => e.key === 'Enter' && addStudent()} placeholder="生徒名を入力 (例: 山田 太郎)" className="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" />
                    <button onClick={addStudent} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-semibold flex items-center gap-2 transition-colors">
                      <IconPlus size={18} /> 登録
                    </button>
                  </div>
                  
                  <div className="mt-6 flex flex-wrap gap-3">
                    {students.map(s => (
                      <div key={s.id} className="bg-gray-100 border border-gray-200 px-4 py-2 rounded-full flex items-center gap-3">
                        <span className="font-medium text-gray-700">{s.name}</span>
                        <button onClick={() => removeStudent(s.id)} className="text-red-400 hover:text-red-600"><IconTrash size={16} /></button>
                      </div>
                    ))}
                    {students.length === 0 && <p className="text-gray-400 text-sm">登録された生徒はいません。</p>}
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'scores' && (
              <div className="print-hidden p-8 max-w-5xl mx-auto">
                <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                  <div className="flex justify-between items-center mb-8 pb-4 border-b">
                    <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2"><IconChart size={28} /> 生徒別 正答率レポート</h2>
                    <select value={scoreViewStudentId} onChange={e => setScoreViewStudentId(e.target.value)} className="p-2 border border-gray-300 rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-500 font-medium">
                      <option value="">生徒を選択...</option>
                      {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                    </select>
                  </div>

                  {!scoreViewStudentId ? (
                    <div className="text-center py-12 text-gray-400 font-medium">右上のメニューから生徒を選択してください。</div>
                  ) : (
                    <div className="space-y-6">
                      {availableChapters.map(ch => {
                        const data = scores[scoreViewStudentId]?.[ch.id];
                        if (!data || data.total === 0) return null;
                        const percent = Math.round((data.correct / data.total) * 100);
                        return (
                          <div key={ch.id} className="flex flex-col gap-2">
                            <div className="flex justify-between items-end">
                              <span className="font-semibold text-gray-700">{ch.title}</span>
                              <span className="text-sm font-bold text-gray-500">{data.correct} / {data.total} 問正解 <span className={`ml-2 px-2 py-0.5 rounded text-white ${percent >= 80 ? 'bg-green-500' : percent >= 50 ? 'bg-yellow-500' : 'bg-red-500'}`}>{percent}%</span></span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                              <div className={`h-3 rounded-full transition-all duration-1000 ${percent >= 80 ? 'bg-green-500' : percent >= 50 ? 'bg-yellow-500' : 'bg-red-500'}`} style={{ width: `${percent}%` }}></div>
                            </div>
                          </div>
                        );
                      })}
                      
                      {(!scores[scoreViewStudentId] || Object.keys(scores[scoreViewStudentId]).length === 0) && (
                        <div className="text-center py-12 text-gray-400 font-medium">まだこの生徒の成績データが登録されていません。</div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
